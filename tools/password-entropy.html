<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Entropy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0c0c0c;
    --fg: #f0ede8;
    --dim: #444;
    --border: #222;
    --red: #ff3131;
    --orange: #ff8c00;
    --yellow: #ffd700;
    --green: #39ff14;
    --accent: #f0ede8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .container {
    width: 100%;
    max-width: 640px;
  }

  header {
    margin-bottom: 48px;
  }

  header h1 {
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -2px;
    text-transform: uppercase;
  }

  header h1 span {
    display: block;
    color: var(--dim);
    font-size: 0.45em;
    letter-spacing: 4px;
    font-weight: 400;
    font-family: 'Syne Mono', monospace;
    margin-bottom: 6px;
  }

  /* Input */
  .input-wrap {
    position: relative;
    margin-bottom: 40px;
  }

  #password-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--fg);
    color: var(--fg);
    font-family: 'Syne Mono', monospace;
    font-size: clamp(20px, 4vw, 32px);
    padding: 12px 48px 12px 0;
    outline: none;
    letter-spacing: 2px;
    transition: border-color 0.2s;
  }

  #password-input::placeholder { color: var(--dim); }
  #password-input:focus { border-color: var(--accent); }

  #toggle-vis {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-family: 'Syne Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 4px;
    transition: color 0.2s;
  }
  #toggle-vis:hover { color: var(--fg); }

  /* Entropy bar */
  .bar-section {
    margin-bottom: 36px;
  }

  .bar-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .bar-label .bits {
    font-family: 'Syne Mono', monospace;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    transition: color 0.4s;
  }

  .bar-label .unit {
    font-family: 'Syne Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .bar-track {
    width: 100%;
    height: 6px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s;
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 20px;
    background: inherit;
    filter: blur(4px);
    opacity: 0.8;
  }

  /* Verdict */
  .verdict {
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -1px;
    margin-bottom: 36px;
    min-height: 1.1em;
    transition: color 0.4s;
  }

  /* Stats grid */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .stat {
    background: var(--bg);
    padding: 18px 20px;
  }

  .stat .label {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat .value {
    font-family: 'Syne Mono', monospace;
    font-size: 20px;
    color: var(--fg);
    transition: color 0.3s;
  }

  /* Crack time */
  .crack-section {
    border-left: 2px solid var(--border);
    padding-left: 20px;
    margin-bottom: 36px;
    transition: border-color 0.4s;
  }

  .crack-section .crack-label {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .crack-time {
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 700;
    line-height: 1.3;
    transition: color 0.4s;
  }

  .crack-context {
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* Character set pills */
  .charset-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
  }

  .pill {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--dim);
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .pill.active {
    border-color: var(--fg);
    color: var(--fg);
  }

  .pill.active.red    { border-color: var(--red);    color: var(--red); }
  .pill.active.orange { border-color: var(--orange); color: var(--orange); }
  .pill.active.yellow { border-color: var(--yellow); color: var(--yellow); }
  .pill.active.green  { border-color: var(--green);  color: var(--green); }

  /* Suggestions */
  .suggestions {
    margin-top: 28px;
  }

  .suggestions .sug-label {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .sug-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
    font-family: 'Syne Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    line-height: 1.4;
  }

  .sug-item .dot {
    width: 4px;
    height: 4px;
    background: var(--dim);
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .sug-item.done { color: var(--fg); }
  .sug-item.done .dot { background: var(--green); }

  footer {
    margin-top: 48px;
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    color: var(--border);
    letter-spacing: 2px;
  }

  /* info button */
  #btn-info {
    position: absolute; top: 16px; right: 16px; z-index: 10;
    background: transparent; border: 1px solid var(--border);
    color: var(--dim); font-family: 'Syne Mono', monospace;
    font-size: 14px; padding: 6px 12px; cursor: pointer; transition: all 0.2s;
  }
  #btn-info:hover { border-color: var(--fg); color: var(--fg); }
  .info-overlay {
    position: fixed; inset: 0; z-index: 1100;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.22s ease;
  }
  .info-overlay.open { opacity: 1; pointer-events: auto; }
  .info-box {
    background: var(--bg); border: 1px solid var(--border);
    padding: 28px 32px 24px; min-width: 300px; position: relative;
    transform: translateY(8px) scale(0.97); transition: transform 0.22s ease;
  }
  .info-overlay.open .info-box { transform: translateY(0) scale(1); }
  .info-brand {
    display: block; font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 20px; letter-spacing: 4px; color: var(--fg);
    text-transform: uppercase; margin-bottom: 20px;
    text-decoration: none; transition: color 0.15s;
  }
  .info-brand:hover { color: var(--accent); }
  .info-close {
    position: absolute; top: 12px; right: 14px;
    background: transparent; border: 1px solid var(--border);
    color: var(--dim); font-family: 'Syne Mono', monospace;
    font-size: 12px; padding: 3px 8px; cursor: pointer; transition: all 0.15s;
  }
  .info-close:hover { color: var(--fg); border-color: var(--fg); }
  .info-line {
    font-family: 'Syne Mono', monospace; font-size: 12px;
    letter-spacing: 2px; color: var(--dim); line-height: 2.4;
  }
  .info-line span { color: var(--fg); }
  .info-nova { color: #4a90d9; text-decoration: none; transition: color 0.15s; }
  .info-nova:hover { color: #6aaaf0; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>
      Password<br>Entropy
    </h1>
  </header>

  <div class="input-wrap">
    <input type="password" id="password-input" placeholder="type your password..." autocomplete="off" spellcheck="false">
    <button id="toggle-vis">SHOW</button>
  </div>

  <div class="bar-section">
    <div class="bar-label">
      <div class="bits" id="bits-display">0</div>
      <div class="unit">BITS OF ENTROPY</div>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar-fill"></div>
    </div>
  </div>

  <div class="verdict" id="verdict">—</div>

  <div class="stats">
    <div class="stat">
      <div class="label">Length</div>
      <div class="value" id="stat-length">0</div>
    </div>
    <div class="stat">
      <div class="label">Charset Size</div>
      <div class="value" id="stat-charset">0</div>
    </div>
    <div class="stat">
      <div class="label">Combinations</div>
      <div class="value" id="stat-combos">—</div>
    </div>
    <div class="stat">
      <div class="label">Unique Chars</div>
      <div class="value" id="stat-unique">0</div>
    </div>
  </div>

  <div class="crack-section" id="crack-section">
    <div class="crack-label">Time to crack (100B guesses/sec)</div>
    <div class="crack-time" id="crack-time">—</div>
    <div class="crack-context" id="crack-context"></div>
  </div>

  <div class="charset-row">
    <div class="pill" id="pill-lower">a–z</div>
    <div class="pill" id="pill-upper">A–Z</div>
    <div class="pill" id="pill-digits">0–9</div>
    <div class="pill" id="pill-symbols">!@#…</div>
    <div class="pill" id="pill-spaces">spaces</div>
  </div>

  <div class="suggestions" id="suggestions">
    <div class="sug-label">Suggestions</div>
  </div>

  <footer>no data is stored or transmitted.</footer>
</div>

<script>
const input = document.getElementById('password-input');
const toggleBtn = document.getElementById('toggle-vis');
const bitsDisplay = document.getElementById('bits-display');
const barFill = document.getElementById('bar-fill');
const verdict = document.getElementById('verdict');
const crackTime = document.getElementById('crack-time');
const crackContext = document.getElementById('crack-context');
const crackSection = document.getElementById('crack-section');
const sugContainer = document.getElementById('suggestions');

const statLength = document.getElementById('stat-length');
const statCharset = document.getElementById('stat-charset');
const statCombos = document.getElementById('stat-combos');
const statUnique = document.getElementById('stat-unique');

const pills = {
  lower:   document.getElementById('pill-lower'),
  upper:   document.getElementById('pill-upper'),
  digits:  document.getElementById('pill-digits'),
  symbols: document.getElementById('pill-symbols'),
  spaces:  document.getElementById('pill-spaces'),
};

// Toggle visibility
let visible = false;
toggleBtn.addEventListener('click', () => {
  visible = !visible;
  input.type = visible ? 'text' : 'password';
  toggleBtn.textContent = visible ? 'HIDE' : 'SHOW';
});

function getColor(bits) {
  if (bits === 0)  return '#444';
  if (bits < 28)   return '#ff3131';
  if (bits < 40)   return '#ff8c00';
  if (bits < 60)   return '#ffd700';
  if (bits < 80)   return '#a8ff3e';
  return '#39ff14';
}

function getVerdict(bits) {
  if (bits === 0)  return { text: '—',            color: '#444' };
  if (bits < 28)   return { text: 'Terrible',      color: '#ff3131' };
  if (bits < 40)   return { text: 'Weak',          color: '#ff8c00' };
  if (bits < 60)   return { text: 'Fair',          color: '#ffd700' };
  if (bits < 80)   return { text: 'Strong',        color: '#a8ff3e' };
  if (bits < 100)  return { text: 'Very Strong',   color: '#39ff14' };
  return           { text: 'Paranoid',             color: '#39ff14' };
}

function formatCrackTime(seconds) {
  if (seconds < 1)           return ['less than a second', 'basically instant'];
  if (seconds < 60)          return [`${Math.round(seconds)} seconds`, 'cracked before you blink'];
  if (seconds < 3600)        return [`${Math.round(seconds/60)} minutes`, 'a quick coffee break'];
  if (seconds < 86400)       return [`${Math.round(seconds/3600)} hours`, 'an afternoon of work'];
  if (seconds < 2592000)     return [`${Math.round(seconds/86400)} days`, 'a dedicated attacker'];
  if (seconds < 31536000)    return [`${Math.round(seconds/2592000)} months`, 'serious effort'];
  if (seconds < 3153600000)  return [`${Math.round(seconds/31536000)} years`, 'longer than your patience'];
  if (seconds < 3.154e13)    return [`${Math.round(seconds/3153600000).toLocaleString()} centuries`, 'longer than civilization'];
  return ['longer than the universe', 'you\'re untouchable'];
}

function formatBigNumber(n) {
  if (!isFinite(n) || n > 1e99) return '10^99+';
  if (n > 1e18) return `10^${Math.floor(Math.log10(n))}`;
  return n.toLocaleString();
}

function analyze(pw) {
  const len = pw.length;
  const hasLower   = /[a-z]/.test(pw);
  const hasUpper   = /[A-Z]/.test(pw);
  const hasDigits  = /[0-9]/.test(pw);
  const hasSymbols = /[^a-zA-Z0-9 ]/.test(pw);
  const hasSpaces  = / /.test(pw);

  let charsetSize = 0;
  if (hasLower)   charsetSize += 26;
  if (hasUpper)   charsetSize += 26;
  if (hasDigits)  charsetSize += 10;
  if (hasSymbols) charsetSize += 32;
  if (hasSpaces)  charsetSize += 1;
  if (charsetSize === 0) charsetSize = 1;

  const bits = len > 0 ? Math.log2(Math.pow(charsetSize, len)) : 0;
  const combinations = len > 0 ? Math.pow(charsetSize, len) : 0;
  const unique = new Set(pw).size;

  // Crack at 100 billion guesses/sec
  const guessesPerSec = 1e11;
  const seconds = combinations / guessesPerSec / 2; // avg half search space

  return { len, bits, charsetSize, combinations, unique, seconds,
           hasLower, hasUpper, hasDigits, hasSymbols, hasSpaces };
}

function getPillColorClass(bits) {
  if (bits < 28)  return 'red';
  if (bits < 40)  return 'orange';
  if (bits < 60)  return 'yellow';
  return 'green';
}

function buildSuggestions(pw, data) {
  const sugs = [
    { text: 'At least 12 characters',        done: data.len >= 12 },
    { text: 'Mix uppercase & lowercase',     done: data.hasLower && data.hasUpper },
    { text: 'Include numbers',               done: data.hasDigits },
    { text: 'Include symbols (!@#$...)',     done: data.hasSymbols },
    { text: 'No repeated characters',        done: data.unique >= Math.min(data.len, 8) },
    { text: 'Over 60 bits of entropy',       done: data.bits >= 60 },
  ];

  let html = '<div class="sug-label">Suggestions</div>';
  for (const s of sugs) {
    html += `<div class="sug-item ${s.done ? 'done' : ''}">
      <div class="dot"></div>
      <div>${s.text}</div>
    </div>`;
  }
  sugContainer.innerHTML = html;
}

input.addEventListener('input', () => {
  const pw = input.value;
  const data = analyze(pw);
  const color = getColor(data.bits);
  const v = getVerdict(data.bits);
  const pct = Math.min((data.bits / 120) * 100, 100);
  const pillClass = getPillColorClass(data.bits);

  // Bar
  barFill.style.width = pct + '%';
  barFill.style.background = color;

  // Bits
  bitsDisplay.textContent = Math.round(data.bits);
  bitsDisplay.style.color = color;

  // Verdict
  verdict.textContent = v.text;
  verdict.style.color = v.color;

  // Stats
  statLength.textContent = data.len;
  statCharset.textContent = data.charsetSize;
  statCombos.textContent = data.len > 0 ? formatBigNumber(data.combinations) : '—';
  statUnique.textContent = data.unique;

  // Crack time
  if (data.len > 0) {
    const [time, context] = formatCrackTime(data.seconds);
    crackTime.textContent = time;
    crackTime.style.color = color;
    crackContext.textContent = context;
    crackSection.style.borderColor = color;
  } else {
    crackTime.textContent = '—';
    crackContext.textContent = '';
    crackSection.style.borderColor = '#222';
  }

  // Pills
  const setActive = (pill, active) => {
    pill.classList.toggle('active', active);
    if (active) {
      pill.classList.remove('red','orange','yellow','green');
      pill.classList.add(pillClass);
    }
  };
  setActive(pills.lower,   data.hasLower);
  setActive(pills.upper,   data.hasUpper);
  setActive(pills.digits,  data.hasDigits);
  setActive(pills.symbols, data.hasSymbols);
  setActive(pills.spaces,  data.hasSpaces);

  buildSuggestions(pw, data);
});
</script>
<button id="btn-info" onclick="toggleInfo()">ⓘ</button>
<!-- info popup -->
<div class="info-overlay" id="info-overlay" onclick="handleOverlayClick(event)">
  <div class="info-box">
    <a href="index.html" id="info-brand" class="info-brand">$UPERNOVÆ</a>
    <button class="info-close" onclick="closeInfo()">✕</button>
    <div class="info-line">// <span id="info-title">—</span></div>
    <div class="info-line">// Tool <span id="info-id">—</span></div>
    <div class="info-line">// Made by <a href="#" id="info-nova" target="_blank" class="info-nova">Nova</a></div>
  </div>
</div>

<script>
// ── Info popup ────────────────────────────────────────────────────────────────
(async () => {
  try {
    const res  = await fetch('tools.json');
    const data = await res.json();
    const file = window.location.pathname.split('/').pop() || '';
    const tool = data.tools.find(t => (t.src || t.file) === file);
    if (tool) {
      document.getElementById('info-title').textContent = tool.title || tool.name;
      document.getElementById('info-id').textContent    = '#' + tool.id;
    }
    if (data.main) document.getElementById('info-brand').href = data.main;
    if (data.lore) document.getElementById('info-nova').href  = data.lore;
  } catch(e) {}
})();
function toggleInfo() { document.getElementById('info-overlay').classList.toggle('open'); }
function closeInfo()  { document.getElementById('info-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target.id === 'info-overlay') closeInfo(); }
</script>
</body>
</html>
