<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Useless Machine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f0e8;
    --box: #e8e0d0;
    --box-shadow: #c8bfaa;
    --box-dark: #b0a898;
    --arm: #c8a96e;
    --arm-dark: #a88848;
    --switch-track-off: #c0b8a8;
    --switch-track-on: #3a7a3a;
    --switch-knob: #f8f4ee;
    --text: #2a2520;
    --text-dim: #8a8070;
    --counter: #3a3530;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    padding: 40px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #c8bfaa 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.35;
    pointer-events: none;
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    text-align: center;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 56px;
    text-align: center;
  }

  /* Wrapper holds box + arm + switch all together */
  .machine-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  /* Main box */
  .box {
    width: 200px;
    height: 110px;
    background: var(--box);
    border-radius: 12px;
    box-shadow:
      0 2px 0 var(--box-dark),
      0 4px 0 var(--box-shadow),
      0 8px 24px rgba(0,0,0,0.12),
      inset 0 1px 0 rgba(255,255,255,0.6);
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }

  /* Slot in the right wall of the box */
  .slot {
    position: absolute;
    top: 50%;
    right: -4px;
    transform: translateY(-50%);
    width: 8px;
    height: 20px;
    background: #b8a888;
    border-radius: 2px;
    z-index: 3;
    transition: opacity 0.1s;
  }
  .slot.open { opacity: 0; }

  /* Decorative vents */
  .vents {
    position: absolute;
    bottom: 16px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .vent {
    width: 40px;
    height: 2px;
    background: var(--box-shadow);
    border-radius: 1px;
  }

  .brand {
    position: absolute;
    bottom: 14px;
    right: 18px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--box-shadow);
    letter-spacing: 2px;
  }

  /* The arm — positioned absolutely on machine-wrap, slides right */
  .arm {
    position: absolute;
    top: 50%;
    left: 200px; /* right edge of the box */
    transform: translateY(-50%) scaleX(0);
    transform-origin: left center;
    width: 100px; /* enough to reach and nudge the switch knob */
    height: 16px;
    background: linear-gradient(to bottom, var(--arm-dark) 0%, var(--arm) 40%, var(--arm) 60%, var(--arm-dark) 100%);
    border-radius: 0 8px 8px 0;
    box-shadow: 0 3px 8px rgba(0,0,0,0.22);
    z-index: 10;
    pointer-events: none;
    transition: transform 0.28s cubic-bezier(0.34, 1.1, 0.64, 1);
  }

  .arm.out {
    transform: translateY(-50%) scaleX(1);
  }

  /* Switch platform */
  .switch-platform {
    width: 100px;
    height: 110px;
    background: var(--box);
    border-radius: 0 12px 12px 0;
    box-shadow:
      0 2px 0 var(--box-dark),
      0 4px 0 var(--box-shadow),
      0 8px 24px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    margin-left: -2px;
    flex-shrink: 0;
  }

  /* Toggle */
  .toggle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }

  .toggle-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .toggle-track {
    width: 52px;
    height: 28px;
    background: var(--switch-track-off);
    border-radius: 14px;
    position: relative;
    transition: background 0.2s;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
  }

  .toggle-track.on { background: var(--switch-track-on); }

  .toggle-knob {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: var(--switch-knob);
    border-radius: 50%;
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }

  .toggle-track.on .toggle-knob { transform: translateX(24px); }

  /* Counter */
  .counter-wrap {
    margin-top: 52px;
    text-align: center;
  }

  .counter-num {
    font-size: clamp(56px, 12vw, 96px);
    color: var(--counter);
    line-height: 1;
    letter-spacing: -3px;
    font-style: italic;
  }

  .counter-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .counter-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 6px;
    min-height: 1.4em;
  }

  @keyframes quip-in {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .quip { animation: quip-in 0.3s ease forwards; }

  /* ── info popup ── */
  #btn-info {
    position: fixed; top: 18px; right: 20px; z-index: 1000;
    background: transparent; border: 1px solid rgba(44,36,22,0.15);
    color: #2c2416; font-family: 'DM Mono', monospace; font-size: 14px;
    padding: 6px 12px; cursor: pointer; transition: all 0.2s;
    opacity: 0.6;
  }
  #btn-info:hover { opacity: 1; border-color: #2c2416; }
  .info-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.22s ease;
  }
  .info-overlay.open { opacity: 1; pointer-events: auto; }
  .info-box {
    background: rgba(245,240,232,0.85); border: 1px solid rgba(44,36,22,0.15);
    padding: 28px 32px 24px; min-width: 300px; position: relative;
    transform: translateY(8px) scale(0.97); transition: transform 0.22s ease;
  }
  .info-overlay.open .info-box { transform: translateY(0) scale(1); }
  .info-brand {
    display: block; font-family: 'DM Serif Display', serif; font-size: 20px;
    letter-spacing: 5px; color: #2c2416; text-transform: uppercase;
    margin-bottom: 20px; text-decoration: none; transition: opacity 0.15s;
  }
  .info-brand:hover { opacity: 0.7; }
  .info-close {
    position: absolute; top: 12px; right: 14px;
    background: transparent; border: 1px solid rgba(44,36,22,0.15);
    color: #2c2416; font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 3px 8px; cursor: pointer; transition: all 0.15s; opacity: 0.5;
  }
  .info-close:hover { opacity: 1; }
  .info-line {
    font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: 2px; color: #2c2416; opacity: 0.5; line-height: 2.4;
  }
  .info-line span { opacity: 1; color: #2c2416; }
  .info-nova { color: #4a90d9; text-decoration: none; opacity: 1 !important; }
  .info-nova:hover { color: #6aaaf0; }
</style>
</head>
<body>

<h1>The Useless Machine</h1>
<div class="subtitle">// serves no purpose</div>

<div class="machine-wrap">
  <div class="box">
    <div class="slot" id="slot"></div>
    <div class="vents">
      <div class="vent"></div>
      <div class="vent"></div>
      <div class="vent"></div>
    </div>
    <div class="brand">MK-I</div>
  </div>

  <!-- Arm is a sibling inside machine-wrap so it can overlap freely -->
  <div class="arm" id="arm"></div>

  <div class="switch-platform">
    <div class="toggle" id="toggle" onclick="handleToggle()">
      <div class="toggle-label" id="toggle-label">OFF</div>
      <div class="toggle-track" id="toggle-track">
        <div class="toggle-knob"></div>
      </div>
    </div>
  </div>
</div>

<div class="counter-wrap">
  <div class="counter-num" id="counter">0</div>
  <div class="counter-label">times turned off</div>
  <div class="counter-sub" id="quip"></div>
</div>

<script>
let count = 0;
let busy = false;

const slot    = document.getElementById('slot');
const arm     = document.getElementById('arm');
const track   = document.getElementById('toggle-track');
const label   = document.getElementById('toggle-label');
const counter = document.getElementById('counter');
const quipEl  = document.getElementById('quip');
const toggle  = document.getElementById('toggle');

const quips = [
  'why would you do that','seriously?','we\'ve been over this',
  'i said no','still no','not happening','you have too much time',
  'ok but why though','this is getting old','i will keep doing this',
  'we can be here all day','please stop','i\'m not tired','are you?',
  'thought so','nope','absolutely not','the answer is no',
  'have you tried being outside','i am inevitable','just... why',
  'do you feel accomplished','i don\'t get tired','you do','stop.',
  'i mean it this time','but still no','we\'re not doing this',
];

function getQuip(n) {
  if (n === 1)   return 'there it goes.';
  if (n === 2)   return 'again?';
  if (n === 5)   return 'fifth time\'s the charm. it\'s not.';
  if (n === 10)  return 'ten times. ten.';
  if (n === 25)  return 'twenty five. seeking help is free.';
  if (n === 50)  return 'fifty. i respect the commitment.';
  if (n === 100) return 'one hundred. legendary.';
  return quips[Math.floor(Math.random() * quips.length)];
}

function handleToggle() {
  if (busy) return;
  busy = true;
  toggle.style.pointerEvents = 'none';

  // 1. Switch flips ON
  track.classList.add('on');
  label.textContent = 'ON';

  // 2. Slot opens
  setTimeout(() => slot.classList.add('open'), 220);

  // 3. Arm extends out
  setTimeout(() => arm.classList.add('out'), 380);

  // 4. Switch flips OFF + arm retracts at the same time
  setTimeout(() => {
    track.classList.remove('on');
    label.textContent = 'OFF';
    arm.classList.remove('out');
    count++;
    counter.textContent = count;
    quipEl.innerHTML = `<span class="quip">${getQuip(count)}</span>`;
  }, 780);

  // 5. Slot closes after arm is back
  setTimeout(() => slot.classList.remove('open'), 1100);

  // 7. Ready again
  setTimeout(() => {
    busy = false;
    toggle.style.pointerEvents = 'auto';
  }, 1500);
}
</script>
<button id="btn-info" onclick="toggleInfo()">ⓘ</button>
<!-- info popup -->
<div class="info-overlay" id="info-overlay" onclick="handleOverlayClick(event)">
  <div class="info-box">
    <a href="index.html" id="info-brand" class="info-brand">$UPERNOVÆ</a>
    <button class="info-close" onclick="closeInfo()">✕</button>
    <div class="info-line">// <span id="info-title">—</span></div>
    <div class="info-line">// Tool <span id="info-id">—</span></div>
    <div class="info-line">// Made by <a href="#" id="info-nova" target="_blank" class="info-nova">Nova</a></div>
  </div>
</div>


<script>
(async () => {
  try {
    const res  = await fetch('tools.json');
    const data = await res.json();
    const file = window.location.pathname.split('/').pop() || '';
    const tool = data.tools.find(t => (t.src || t.file) === file);
    if (tool) {
      document.getElementById('info-title').textContent = tool.title || tool.name;
      document.getElementById('info-id').textContent    = '#' + tool.id;
    }
    if (data.main) document.getElementById('info-brand').href = data.main;
    if (data.lore) document.getElementById('info-nova').href  = data.lore;
  } catch(e) {}
})();
function toggleInfo() { document.getElementById('info-overlay').classList.toggle('open'); }
function closeInfo()  { document.getElementById('info-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target.id === 'info-overlay') closeInfo(); }
</script>
</body>
</html>
