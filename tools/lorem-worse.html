<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #1a1a18;
    --panel: #222220;
    --border: #333330;
    --fg: #f0ede6;

    font-size: 10px;

    color: var(--dim);

  }

  /* ── Sidebar ── */
  aside {

    cursor: pointer;

    border-radius: 2px;
    font-style: italic;

  .genre-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);

    font-style: italic;

  /* ── Output ── */

    flex-direction: column;

  .output-toolbar {

  .output-area {

  .output-text {

  .output-text p:nth-child(2) { animation-delay: 0.06s; }
  .output-text p:nth-child(3) { animation-delay: 0.12s; }

  el.classList.add('active');
}

function setType(t, el) {
  outputType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Generator ─────────────────────────────────────────────────────────────────

function fillTemplate(tpl, g) {
  return tpl
    .replace(/{noun}/g,  () => pick(g.nouns))
    .replace(/{verb}/g,  () => pick(g.verbs))
    .replace(/{adj}/g,   () => pick(g.adj));
}

function makeSentence(g) {
  return fillTemplate(pick(g.sentences), g);
}

function makeParagraph(g, sentCount) {
  const sents = [];
  for (let i = 0; i < sentCount; i++) sents.push(makeSentence(g));
  return sents.join(' ');
}

function makeWords(g, count) {
  const pool = [...g.nouns, ...g.adj];
  const words = [];
  for (let i = 0; i < count; i++) words.push(pick(pool));
  return words.join(', ') + '.';
}

function generate() {
  const g = genres[genre];
  const count = parseInt(document.getElementById('count-slider').value);
  const outputEl = document.getElementById('output');
  let paragraphs = [];

  if (outputType === 'paragraphs') {
    for (let i = 0; i < count; i++) {
      paragraphs.push(makeParagraph(g, 3 + Math.floor(Math.random() * 3)));
    }
  } else if (outputType === 'sentences') {
    for (let i = 0; i < count; i++) {
      paragraphs.push(makeSentence(g));
    }
  } else {
    paragraphs.push(makeWords(g, count * 8));
  }

  outputEl.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');

  const wordCount = outputEl.textContent.trim().split(/\s+/).length;
  document.getElementById('output-meta').textContent =
    `${wordCount} words · ${genre} · ${outputType}`;
}

function copyOutput() {
  // Extract text from each <p> and join with double newlines to preserve paragraph breaks
  const paras = document.getElementById('output').querySelectorAll('p');
  const text = paras.length
    ? Array.from(paras).map(p => p.textContent.trim()).join('\n\n')
    : document.getElementById('output').textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

// Generate on load

<!-- info popup -->
<div class="info-overlay" id="info-overlay" onclick="handleOverlayClick(event)">
  <div class="info-box">
    <a href="index.html" id="info-brand" class="info-brand">$UPERNOVÆ</a>
    <button class="info-close" onclick="closeInfo()">✕</button>
    <div class="info-line">// <span id="info-title">—</span></div>
    <div class="info-line">// Tool <span id="info-id">—</span></div>
    <div class="info-line">// Made by <a href="#" id="info-nova" target="_blank" class="info-nova">Nova</a></div>
  </div>
</div>


<script>
(async () => {
  try {
    const res  = await fetch('../tools.json');
    const data = await res.json();
    const file = window.location.pathname.split('/').pop() || '';
    const tool = data.tools.find(t => { const s = t.src || t.file || ''; return s === file || s.split('/').pop() === file; });
    if (tool) {
      document.getElementById('info-title').textContent = tool.title || tool.name;
      document.getElementById('info-id').textContent    = '#' + tool.id;
    }
    if (data.main) document.getElementById('info-brand').href = data.main;
    if (data.lore) document.getElementById('info-nova').href  = data.lore;
  } catch(e) {}
})();
function toggleInfo() { document.getElementById('info-overlay').classList.toggle('open'); }
function closeInfo()  { document.getElementById('info-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target.id === 'info-overlay') closeInfo(); }
</script>
</body>
</html>
